<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Códigos</title>
    <style>
        body { font-family: sans-serif; background-color: #141414; color: white; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; }
        button { 
            background-color: #e50914; color: white; border: none; padding: 15px 25px; 
            font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%;
        }
        button:disabled { background-color: #555; }
        #lista { margin-top: 20px; text-align: left; }
        .email-card { 
            background: #2f2f2f; padding: 15px; border-radius: 8px; margin-bottom: 15px; 
            border-left: 5px solid #e50914;
        }
        .email-info { font-size: 12px; color: #aaa; margin-bottom: 8px; }
        .email-to { color: #00df81; font-weight: bold; margin-bottom: 10px; display: block; }
        .email-body { background: white; color: black; padding: 10px; border-radius: 4px; overflow: auto; }
    </style>
</head>
<body>

    <div class="container">
        <h1>SISTEMA DE CÓDIGOS</h1>
        
        <button id="btn" onclick="obtenerCorreos()">BUSCAR CÓDIGOS RECIENTES</button>

        <div id="lista"></div>
    </div>

    <script>
        async function obtenerCorreos() {
            const btn = document.getElementById('btn');
            const lista = document.getElementById('lista');

            btn.disabled = true;
            btn.innerText = "BUSCANDO...";
            lista.innerHTML = "<p style='text-align:center;'>Consultando Gmail...</p>";

            try {
                const response = await fetch('/api/emails');
                const data = await response.json();

                lista.innerHTML = "";
                btn.disabled = false;
                btn.innerText = "BUSCAR CÓDIGOS RECIENTES";

                if (data.emails && data.emails.length > 0) {
                    data.emails.forEach(email => {
                        const div = document.createElement('div');
                        div.className = 'email-card';
                        div.innerHTML = `
                            <div class="email-info">📅 ${email.date}</div>
                            <div class="email-to">Para: ${email.to}</div>
                            <div style="font-weight:bold; margin-bottom:10px;">${email.subject}</div>
                            <div class="email-body">${email.html}</div>
                        `;
                        lista.appendChild(div);
                    });
                } else {
                    lista.innerHTML = "<p style='text-align:center; color:#888;'>No hay códigos nuevos (últimos 15 min).</p>";
                }
            } catch (e) {
                btn.disabled = false;
                btn.innerText = "ERROR - REINTENTAR";
                lista.innerHTML = "<p style='color:red;'>Error de conexión.</p>";
            }
        }
    </script>
</body>
</html>
